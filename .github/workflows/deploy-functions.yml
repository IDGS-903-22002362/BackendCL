name: Deploy Firebase Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions deps
        run: |
          cd functions
          npm install

      - name: Create Service Account Files
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_KEY }}' > serviceAccountKey.json
          echo '${{ secrets.SERVICE_ACCOUNT_APP_OFICIAL }}' > serviceAccountAppOficial.json

      - name: Verify Service Account Files
        run: |
          if [ ! -s serviceAccountKey.json ]; then
            echo "Error: serviceAccountKey.json is empty or missing"
            exit 1
          fi
          if [ ! -s serviceAccountAppOficial.json ]; then
            echo "Error: serviceAccountAppOficial.json is empty or missing"
            exit 1
          fi
          echo "✓ Service account files created successfully"
          ls -lh serviceAccount*.json

      - name: Build Functions
        env:
          # Definimos variables intermedias para mayor seguridad
          JWT_EXPIRES_VAL: ${{ secrets.JWT_EXPIRES_IN }}
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          SERVICE_ACCOUNT_APP_OFICIAL: ${{ secrets.SERVICE_ACCOUNT_APP_OFICIAL }}
        run: |
          cd functions
          # Usamos las variables definidas arriba (con $) para crear el archivo .env
          echo "JWT_EXPIRES_IN=$JWT_EXPIRES_VAL" > .env
          npm run build

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/serviceAccountKey.json
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          SERVICE_ACCOUNT_APP_OFICIAL: ${{ secrets.SERVICE_ACCOUNT_APP_OFICIAL }}
        run: firebase deploy --only functions

      - name: Grant Eventarc Invoker Access To Try-On Worker
        run: |
          gcloud run services add-iam-policy-binding processtryonjob \
            --region=us-central1 \
            --project=e-comerce-leon \
            --member=serviceAccount:vertex-tryon-sa@e-comerce-leon.iam.gserviceaccount.com \
            --role=roles/run.invoker

      - name: Verify Eventarc Invoker Access
        run: |
          POLICY=$(gcloud run services get-iam-policy processtryonjob \
            --region=us-central1 \
            --project=e-comerce-leon \
            --format="json")

          echo "$POLICY" | grep -q '"role": "roles/run.invoker"' || {
            echo "Missing roles/run.invoker binding on processtryonjob"
            exit 1
          }

          echo "$POLICY" | grep -q 'serviceAccount:vertex-tryon-sa@e-comerce-leon.iam.gserviceaccount.com' || {
            echo "Missing vertex-tryon-sa member on processtryonjob"
            exit 1
          }

  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🚀 **Nuevo push en BackendCL**\n👤 Autor: ${GITHUB_ACTOR}\n📝 Commit: ${GITHUB_SHA}\"
          }" \
          $DISCORD_WEBHOOK
