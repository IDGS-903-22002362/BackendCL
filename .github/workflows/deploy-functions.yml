name: Deploy Firebase Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14.9.0

      - name: Install Functions deps
        run: |
          cd functions
          npm ci

      - name: Create Service Account Files
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          SERVICE_ACCOUNT_APP_OFICIAL: ${{ secrets.SERVICE_ACCOUNT_APP_OFICIAL }}
        run: |
          set -euo pipefail
          # echo evita corrupción de JSON con printf (% en claves) y respeta saltos de línea.
          echo "${SERVICE_ACCOUNT_KEY}" > "${GITHUB_WORKSPACE}/serviceAccountKey.json"
          echo "${SERVICE_ACCOUNT_APP_OFICIAL}" > "${GITHUB_WORKSPACE}/serviceAccountAppOficial.json"

      - name: Verify Service Account Files
        run: |
          set -euo pipefail
          for file in serviceAccountKey.json serviceAccountAppOficial.json; do
            if [ ! -s "${file}" ]; then
              echo "Error: ${file} is empty or missing"
              exit 1
            fi
            python3 -m json.tool "${file}" > /dev/null
          done
          echo "✓ Service account files are valid JSON"
          ls -lh serviceAccount*.json

      - name: Verify Firebase CLI authentication
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail
          firebase --version
          test -s "${GOOGLE_APPLICATION_CREDENTIALS}"
          firebase projects:list --project e-comerce-leon --non-interactive
          echo "✓ Firebase CLI authenticated with service account"

      - name: Create Functions Runtime Env
        env:
          JWT_EXPIRES_VAL: ${{ secrets.JWT_EXPIRES_IN }}
        run: |
          cd functions
          cat > .env <<EOF
          # Generated by GitHub Actions. Non-secret Firebase Functions runtime env.
          GCP_PROJECT_ID=e-comerce-leon
          GCP_REGION=us-central1
          STORAGE_BUCKET=e-comerce-leon.firebasestorage.app
          BACKEND_PUBLIC_URL=https://us-central1-e-comerce-leon.cloudfunctions.net/api
          PAYMENTS_BACKEND_BASE_URL=https://us-central1-e-comerce-leon.cloudfunctions.net/api

          APP_OFICIAL_PROJECT_ID=app-oficial-leon
          APP_OFICIAL_STORAGE_BUCKET=app-oficial-leon.firebasestorage.app

          STRIPE_PUBLISHABLE_KEY=
          STRIPE_CURRENCY=mxn
          JWT_EXPIRES_IN=$JWT_EXPIRES_VAL

          AI_GEMINI_MODE=vertexai
          GEMINI_MODEL_PRIMARY=gemini-2.5-pro
          GEMINI_MODEL_FAST=gemini-2.5-flash
          GEMINI_MODEL_SUMMARY=gemini-2.5-flash-lite
          AI_GEMINI_TIMEOUT_MS=30000
          AI_GEMINI_TEMPERATURE=0.2
          AI_MAX_TOOL_STEPS=6
          AI_CONTEXT_MAX_MESSAGES=12
          AI_SUMMARY_MAX_CHARS=2500
          VERTEX_TRYON_MODEL=virtual-try-on-001
          VERTEX_TRYON_PUBLISHER=google
          VERTEX_TRYON_SERVICE_ACCOUNT=vertex-tryon-sa@e-comerce-leon.iam.gserviceaccount.com
          AI_TRYON_ENABLED=true
          AI_TRYON_CONSENT_VERSION=v1
          AI_TRYON_TIMEOUT_MS=120000
          AI_TRYON_POLL_INTERVAL_MS=4000
          AI_TRYON_USER_RATE_LIMIT_WINDOW_MS=3600000
          AI_TRYON_USER_RATE_LIMIT_MAX=10
          AI_TRYON_IDEMPOTENCY_WINDOW_MS=300000
          AI_PREVIEW_MOCKUP_MODEL=imagen-product-recontext-preview-06-30
          AI_PREVIEW_MOCKUP_API_VERSION=
          AI_PREVIEW_MOCKUP_TIMEOUT_MS=120000
          AI_PREVIEW_MOCKUP_FALLBACK_MODEL=gemini-2.5-flash-image
          AI_PREVIEW_MOCKUP_FALLBACK_REGION=us-central1
          AI_PREVIEW_MOCKUP_FALLBACK_API_VERSION=v1

          AI_ENABLE_SSE=true
          AI_RATE_LIMIT_WINDOW_MS=60000
          AI_RATE_LIMIT_MAX=30

          AI_UPLOAD_MAX_MB=10
          AI_UPLOAD_MAX_FILES=1
          AI_UPLOAD_MIN_WIDTH=512
          AI_UPLOAD_MIN_HEIGHT=512
          AI_UPLOAD_MAX_PIXELS=16000000
          AI_STORAGE_UPLOAD_FOLDER=ai/uploads
          AI_STORAGE_RESULT_FOLDER=ai/tryon-results
          AI_SIGNED_URL_TTL_SEC=900
          AI_STORAGE_PUBLIC=false

          FEDEX_PICKUP_ENABLED=true
          FEDEX_PICKUP_DEFAULT_CARRIER_CODE=FDXE
          FEDEX_PICKUP_DEFAULT_LOCATION=FRONT
          FEDEX_AUTO_CREATE_LABEL_ON_PAID=false

          LMX_TIMEZONE=America/Mexico_City
          LMX_SCHEDULE=every 6 hours
          NOTIFICATIONS_DEFAULT_TIMEZONE=America/Mexico_City
          NOTIFICATIONS_DEFAULT_LOCALE=es-MX
          NOTIFICATIONS_QUIET_HOURS_ENABLED=true
          NOTIFICATIONS_QUIET_HOURS_START=22
          NOTIFICATIONS_QUIET_HOURS_END=9
          AI_NOTIFICATION_PROMPT_VERSION=v1
          EOF

      - name: Build Functions
        run: |
          cd functions
          npm run build

      - name: Deploy to Firebase in staggered batches
        env:
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail

          # Firebase CLI usa ADC vía el archivo generado por google-github-actions/auth
          # (más fiable que reescribir el JSON manualmente en el paso de deploy).
          if [ ! -s "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            echo "Error: ${GOOGLE_APPLICATION_CREDENTIALS} is missing or empty"
            exit 1
          fi
          cd "${GITHUB_WORKSPACE}"

          batches=(
            "functions:api,functions:processTryOnJob,functions:processNotificationEvent"
            "functions:processPaymentEvent,functions:userLevelSyncFunction,functions:scheduledAccountDeletionFunction"
            "functions:syncInstagramPostsFunction,functions:reconcileAplazoPaymentsFunction,functions:expirePickupOrdersFunction"
            "functions:lowStockDailyDigest,functions:abandonedCartNotifications,functions:inactiveUserNotifications"
            "functions:campaignNotifications,functions:probableRepurchaseNotifications,functions:productRatingReminderNotifications"
          )

          for batch in "${batches[@]}"; do
            echo "Deploying batch: ${batch}"
            for attempt in 1 2 3; do
              if firebase deploy --only "${batch}" --project e-comerce-leon --non-interactive; then
                break
              fi

              if [ "${attempt}" -eq 3 ]; then
                echo "Firebase deploy failed after ${attempt} attempts for batch: ${batch}"
                exit 1
              fi

              wait_seconds=$((attempt * 120))
              echo "Deploy attempt ${attempt} failed. Waiting ${wait_seconds}s before retrying..."
              sleep "${wait_seconds}"
            done
            echo "Batch finished. Waiting before starting the next Firebase build wave..."
            sleep 45
          done

      - name: Grant Eventarc Invoker Access To Try-On Worker
        run: |
          gcloud run services add-iam-policy-binding processtryonjob \
            --region=us-central1 \
            --project=e-comerce-leon \
            --member=serviceAccount:vertex-tryon-sa@e-comerce-leon.iam.gserviceaccount.com \
            --role=roles/run.invoker

      - name: Verify Eventarc Invoker Access
        run: |
          POLICY=$(gcloud run services get-iam-policy processtryonjob \
            --region=us-central1 \
            --project=e-comerce-leon \
            --format="json")

          echo "$POLICY" | grep -q '"role": "roles/run.invoker"' || {
            echo "Missing roles/run.invoker binding on processtryonjob"
            exit 1
          }

          echo "$POLICY" | grep -q 'serviceAccount:vertex-tryon-sa@e-comerce-leon.iam.gserviceaccount.com' || {
            echo "Missing vertex-tryon-sa member on processtryonjob"
            exit 1
          }

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🚀 **Nuevo push en BackendCL**\n👤 Autor: ${GITHUB_ACTOR}\n📝 Commit: ${GITHUB_SHA}\"
          }" \
          $DISCORD_WEBHOOK
